<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Security Monitor — Login</title>
  <link rel="stylesheet" href="cloud_security_monitor_login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-background"></div>
    <div class="login-card">
      <div class="login-card-glow"></div>
      <div class="login-card-grid">
        <div class="login-hero">
          <div class="shield-pane">
            <div class="shield-base"></div>
            <div class="shield-facets">
              <span class="facet facet-a"></span>
              <span class="facet facet-b"></span>
              <span class="facet facet-c"></span>
            </div>
            <div class="shield-core"></div>
            <div class="shield-line"></div>
          </div>
          <div class="shield-cloud"></div>
          <div class="title-block">
            <h1>Cloud Security Monitor</h1>
            <p>Login to your account</p>
          </div>
        </div>

        <form class="login-form">
          <div class="panel-label">Username</div>
          <input type="text" value="admin" readonly />
          <div class="panel-label">Password</div>
          <input type="password" placeholder="Enter password..." />
          <div class="form-row">
            <label class="checkbox-wrap">
              <input type="checkbox" checked />
              <span>Remember me</span>
            </label>
          </div>
          <button type="submit" class="login-button">Login</button>
          <p class="form-note">Don't have an account? <a href="#">Register here</a></p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
